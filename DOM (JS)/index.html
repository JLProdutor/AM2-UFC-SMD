<!-- AUtoração Multimídia II (26/05/2026) - Métodos e Propriedades DOM -->
<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    <body>
        <!-- Pt. 1 -->
        <p id="demo">Eae galerinha</p><hr>

        <!-- Pt. 2 -->
        <h1 id="titulo">Olá Mundo!</h1>
        <p id="info">Texto</p><hr>

        <!-- Pt. 3 -->
        <p>Sou um parágrafo</p>
        <p>Eu também</p>
        <p>E eu também sou</p>
        <button onclick="destacar()">Destacar Parágrafos</button><hr>

        <!-- Pt. 4 -->
        <p class="aviso">Tô te avisando</p>
        <p class="normal">Sou normal</p>
        <p class="aviso">Olha o aviso</p>
        <p class="aviso">Já avisei né</p><hr>

        <!-- Pt. 5 -->
        <div id="box">Vai me trocar por uma lista?</div><br>
        <button id="btn">Inserir Lista</button><hr>

        <!-- Pt. 6 -->
         <img id="foto" src="antiga.jpg" alt="Foto" height="100px" width="100px"><br>
         <a id="link" href="#">Ir</a><br><br>
         <input id="nome" value="">
         <button id="enviar">Enviar</button>

        <script>
            // Pt. 1
            document.getElementById("demo").innerHTML = "Aula 26/05/2026";

            // Pt. 2
            const h = document.getElementById("titulo");
            const p =document.getElementById("info");
            h.innerText = "DOM Interativo";
            p.style.color = "royalblue";
            p.innerText = "Texto trocado pelo JS!";

            // Pt. 3
            function destacar(){
                const ps = document.getElementsByTagName("p");
                for(let i = 0; i < ps.length; i++){
                    ps[i].style.background = "royalblue";
                    ps[i].style.color = "white";
                }
            }

            // Pt.4
            const avisos = document.getElementsByClassName("aviso");
            console.log("Total:", avisos.length);
            for(let i = 0; i < avisos.length; i++){
                avisos[i].style.color = "crimson";
                avisos[i].innerText = "⚠️ " + avisos[i].innerText;
            }

            // Pt. 5
            const box = document.getElementById("box");
            document.getElementById("btn").onclick = () => {
                box.innerHTML = `
                <h3></h3>
                <ul>
                    <li><b>1.</b> Estudar DOM</li>
                    <li><b>2.</b> Praticar JS</li>
                </ul>
                `;
            };

            // Pt. 6
            document.getElementById("foto").src = "https://avatars.githubusercontent.com/u/102752985?v=4";
            document.getElementById("foto").alt = "Nova foto";
            document.getElementById("link").href = "https://github.com/JLProdutor";
            document.getElementById("nome").value = "João Lucas";
            document.getElementById("enviar").disabled = true;
        </script>
    </body>
</html>
